html
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple Embedded JavaScript</title>
    </head>
    <body>
        <script type="text/javascript">
            document.write("<h1>Welcome to Embedded JavaScript!</h1>");
            document.write("<p>This is a simple example of embedding JavaScript within an HTML document.</p>");
            document.write("<p>JavaScript can be used to dynamically generate content on a webpage.</p>");
        </script>

    </body>
</html>
